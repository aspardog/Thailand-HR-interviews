# Anchor Quotes: Thailand Human Rights Report 2025
# Extraídas del Quote Bank del dashboard HTML (HR-INT.html)
# Estas 22 quotes DEBEN aparecer en cada pipeline run

# ============================================================
# REGLAS DE VALIDACIÓN
# ============================================================
validation_rules:
  total_anchors: 22
  pass_threshold: 100  # % de quotes que deben estar presentes
  # Una quote se considera "encontrada" si:
  # 1. El text_fragment aparece en los outputs (puede ser substring)
  # 2. Está atribuida a la fuente correcta (expected_source)
  # 3. Aparece en contenido relacionado con la dimensión esperada

# ============================================================
# DIMENSION 0: Overall Assessment (5 quotes)
# ============================================================
anchor_quotes:

  - id: AQ01
    dimension: 0
    theme: "enforcement"
    tags: ["Summary", "Critical"]
    text: "Fundamental rights. It's there, but enforcement is usually cherry picked."
    text_fragment: "enforcement is usually cherry picked"
    expected_source: INT08
    source_description: "Private Practice Lawyer"
    priority: critical

  - id: AQ02
    dimension: 0
    theme: "enforcement"
    tags: ["Enforcement"]
    text: "We have all that good stuff, all the human rights, all the protection. It's just we don't enforce it. Unless, you know, we choose to."
    text_fragment: "we don't enforce it. Unless, you know, we choose to"
    expected_source: INT08
    source_description: "Private Practice Lawyer"
    priority: critical

  - id: AQ03
    dimension: 0
    theme: "warning"
    tags: ["Warning", "Critical"]
    text: "The current picture is great but from what I see is like a downhill of the trend."
    text_fragment: "downhill of the trend"
    expected_source: INT07
    source_description: "OHCHR Representative"
    priority: critical

  - id: AQ04
    dimension: 0
    theme: "summary"
    tags: ["Summary"]
    text: "It's a story of two halves... simultaneous progress and regression."
    text_fragment: "story of two halves"
    expected_source: INT02
    source_description: "UNDP Representatives"
    priority: critical

  - id: AQ05
    dimension: 0
    theme: "enforcement"
    tags: ["Enforcement", "Critical"]
    text: "The legal framework for human rights exists... but selective enforcement undermines it completely."
    text_fragment: "selective enforcement undermines it completely"
    expected_source: INT06
    source_description: "Thai Lawyers for Human Rights"
    priority: critical

