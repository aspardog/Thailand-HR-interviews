# Metrics Snapshot Template
# Generated by consistency test after each pipeline run
# Copy this template and fill in values

run_metadata:
  version: "v#"  # Increment for each run
  date: "YYYY-MM-DD"
  interviews_processed: 0
  interviews_with_summary_insights: 0
  pipeline_steps_completed: [1, 2, 3, 4]  # Which steps were run
  notes: ""  # Any relevant notes about this run

# ============================================================
# INTERVIEW METRICS
# One entry per interview analyzed
# ============================================================
interview_metrics:
  INT01:
    has_summary_insights: true
    challenges_count: 0
    highlights_count: 0
    quotes_count: 0
    fragments_count: 0
    dimensions_covered: []  # e.g., [0, 1, 2, 4]
    dimension_depth:  # High/Medium/Low per dimension
      dim_0: ""
      dim_1: ""
      dim_2: ""
      dim_3: ""
      dim_4: ""
    vulnerable_groups_mentioned: []  # e.g., [VG-MW, VG-MM]
    geographic_codes: []  # e.g., [GEO-DS, GEO-NA]
    word_count: 0

  INT02:
    has_summary_insights: false
    challenges_count: 0
    highlights_count: 0
    quotes_count: 0
    fragments_count: 0
